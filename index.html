<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile 0.3MP Camera</title>
<style>
  body {
    font-family: system-ui;
    text-align: center;
    background: #111;
    color: white;
  }
  video, img {
    width: 100%;
    max-width: 400px;
    border-radius: 12px;
    margin-top: 10px;
  }
  button {
    padding: 12px 20px;
    margin: 8px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
  }
</style>
</head>
<body>

<h2>📸 0.3 Megapixel Camera</h2>

<video id="video" autoplay playsinline></video>
<br>
<button onclick="startCamera()">Start Camera</button>
<button onclick="takePhoto()">Snap Photo</button>

<canvas id="canvas" style="display:none;"></canvas>
<img id="output" />

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const output = document.getElementById('output');

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: "environment" } }
    });
    video.srcObject = stream;
  } catch (err) {
    alert("Could not access back camera. Trying default...");
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  }
}

function takePhoto() {
  const context = canvas.getContext('2d');

  // Maintain aspect ratio but cap at 0.3MP
  const targetPixels = 300000;
  const aspectRatio = video.videoWidth / video.videoHeight;
  
  let newWidth = Math.sqrt(targetPixels * aspectRatio);
  let newHeight = newWidth / aspectRatio;

  canvas.width = newWidth;
  canvas.height = newHeight;

  context.drawImage(video, 0, 0, newWidth, newHeight);

  const compressedImage = canvas.toDataURL('image/jpeg', 0.75);
  output.src = compressedImage;
}
</script>

</body>
</html>
